# Netlify Configuration for ShopCart
# Deploy as a static site with serverless functions for backend API

[build]
  # No build command needed for plain HTML/CSS/JS
  publish = "."
  functions = "netlify/functions"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/admin/menu"
  to = "/.netlify/functions/admin-menu"
  status = 200

[[redirects]]
  from = "/admin/payments"
  to = "/.netlify/functions/admin-payments"
  status = 200

[[redirects]]
  from = "/admin/orders"
  to = "/.netlify/functions/admin-orders"
  status = 200

[[redirects]]
  from = "/admin/upload_image"
  to = "/.netlify/functions/admin-upload-image"
  status = 200

[[redirects]]
  from = "/send_otp"
  to = "/.netlify/functions/send-otp"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
