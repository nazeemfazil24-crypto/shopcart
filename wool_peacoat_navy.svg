<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a8e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="400" rx="12" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="200" y="175" text-anchor="middle" font-size="80" filter="url(#shadow)">🧥</text>
  <text x="200" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.9)" filter="url(#shadow)">Peacoat Navy</text>
  <text x="200" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">SHOPCART PREMIUM</text>
</svg>